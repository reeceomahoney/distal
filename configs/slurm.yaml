clusters:
  isambard:
    host: u6jz.aip2.isambard
    remote_path: /home/u6jz/reece.u6jz/distal
    time: 24
    gpu: ""
    ngpu: 2
    cpus: 144
    mem: 1600M
    partition: workq
    envs:
      - PATH: $HOME/.local/bin:$HOME/.pixi/bin:$PWD/.pixi/envs/cu126/bin:$PATH
      - LD_LIBRARY_PATH: $PWD/.pixi/envs/cu126/lib:$LD_LIBRARY_PATH

  arc:
    host: htc
    remote_path: /data/engs-robotics-ml/kebl6123/distal
    time: 12
    gpu: h100
    ngpu: 1
    cpus: 24
    mem: 8G
    partition: short
    priority: true
    envs:
      - PATH: $HOME/.local/bin:$HOME/.pixi/bin:$PWD/.pixi/envs/default/bin:$PATH
      - LD_LIBRARY_PATH: $PWD/.pixi/envs/default/lib:$LD_LIBRARY_PATH

envs:
  - WANDB_API_KEY
  - HF_TOKEN
  - MUJOCO_GL: egl
  - OPENBLAS_NUM_THREADS: 8
  - OMP_NUM_THREADS: 8
  - MKL_NUM_THREADS: 8
  - TORCHINDUCTOR_CACHE_DIR: $HOME/.cache/torchinductor
  - TRITON_CACHE_DIR: $HOME/.cache/triton
  - PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  - CMAKE_POLICY_VERSION_MINIMUM: 3.5

command: |-
  pixi run -e cu126 accelerate launch --multi_gpu --num_processes=2 distal/train_pi_star.py
  # pixi run python distal/train_value.py
