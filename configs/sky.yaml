name: distal-train

resources:
  cloud: vast
  accelerators: RTX5090
  image_id: docker:nvidia/cuda:12.8.0-cudnn-devel-ubuntu22.04
  disk_size: 64
  autostop:
    idle_minutes: 10
    down: true

envs:
  HF_TOKEN:
  WANDB_API_KEY:
  MUJOCO_GL: egl
  PYOPENGL_PLATFORM: egl
  SLURM_JOB_ID: 0  # suppress tqdm
  CMAKE_POLICY_VERSION_MINIMUM: 3.5
workdir: .

setup: |
  curl -fsSL https://pixi.sh/install.sh | bash
  export PATH="$HOME/.pixi/bin:$PATH"

  cd ~/sky_workdir
  pixi config set --local run-post-link-scripts insecure
  pixi install

  bash ~/sky_workdir/scripts/setup_libero.sh
  pixi run python ~/sky_workdir/.pixi/envs/default/lib/python3.12/site-packages/robosuite/scripts/setup_macros.py

run: |
  cd ~/sky_workdir
  pixi run eval
